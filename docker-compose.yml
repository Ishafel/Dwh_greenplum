services:
  gpdb:
    image: woblerr/greenplum:6.27.1
    stop_grace_period: 2m
    ports:
      - "${GREENPLUM_PORT:-5433}:5432"
    environment:
      GREENPLUM_PASSWORD: ${GREENPLUM_PASSWORD:-gpadminpw}
      GREENPLUM_DATABASE_NAME: ${GREENPLUM_DATABASE_NAME:-gpdb}
    volumes:
      - gpdata:/data
    shm_size: "1gb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpadmin -d $${GREENPLUM_DATABASE_NAME:-gpdb} -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  gpdata:
