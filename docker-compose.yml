services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17.9}
    hostname: postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-app} -d $${POSTGRES_DB:-app} -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  gpdb:
    image: woblerr/greenplum:${GREENPLUM_VERSION:-6.27.1}
    hostname: gpdb
    restart: unless-stopped
    stop_grace_period: 2m
    ports:
      - "${GREENPLUM_PORT:-5433}:5432"
      - "${PXF_PORT:-5888}:5888"
    environment:
      GREENPLUM_PASSWORD: ${GREENPLUM_PASSWORD:-gpadminpw}
      GREENPLUM_DATABASE_NAME: ${GREENPLUM_DATABASE_NAME:-gpdb}
      GREENPLUM_PXF_ENABLE: ${GREENPLUM_PXF_ENABLE:-true}
    command: ["/greenplum/init-4-segments.sh"]
    volumes:
      - gpdata:/data
      - hive_warehouse:/opt/hive/data/warehouse:ro
      - ./greenplum/init-4-segments.sh:/greenplum/init-4-segments.sh:ro
      - ./greenplum/pxf/servers:/greenplum/pxf/servers:ro
    shm_size: "1gb"
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/greenplum-db/bin/pg_isready -U gpadmin -d $${GREENPLUM_DATABASE_NAME:-gpdb} -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  hive-metastore:
    image: apache/hive:${HIVE_VERSION:-3.1.3}
    platform: ${HIVE_PLATFORM:-linux/amd64}
    container_name: hive-metastore
    hostname: hive-metastore
    user: root
    restart: unless-stopped
    ports:
      - "${HIVE_METASTORE_PORT:-9083}:9083"
    volumes:
      - hive_metastore_db:/opt/hive/metastore_db
      - hive_warehouse:/opt/hive/data/warehouse
      - ./hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./hive/start-metastore.sh:/opt/hive/bin/start-metastore-local.sh:ro
    entrypoint: ["/opt/hive/bin/start-metastore-local.sh"]
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/localhost/9083'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 45s

  hive-init:
    image: apache/hive:${HIVE_VERSION:-3.1.3}
    platform: ${HIVE_PLATFORM:-linux/amd64}
    user: root
    environment:
      HIVE_CONF_DIR: /opt/hive/client-conf
    depends_on:
      hive-metastore:
        condition: service_healthy
    volumes:
      - hive_warehouse:/opt/hive/data/warehouse
      - ./hive/client-conf:/opt/hive/client-conf:ro
      - ./hive/init-example.sh:/opt/hive/bin/init-example-local.sh:ro
    entrypoint: ["/opt/hive/bin/init-example-local.sh"]

  gpfdist:
    image: woblerr/greenplum:6.27.1
    hostname: gpfdist
    restart: unless-stopped
    command: ["/greenplum/start-gpfdist.sh"]
    ports:
      - "${GPFDIST_PORT:-8081}:8081"
    volumes:
      - ./data/landing:/data/landing:ro
      - ./greenplum/start-gpfdist.sh:/greenplum/start-gpfdist.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x gpfdist >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nifi:
    build:
      context: ./nifi
      args:
        NIFI_VERSION: ${NIFI_VERSION:-2.8.0}
        POSTGRES_JDBC_VERSION: ${POSTGRES_JDBC_VERSION:-42.7.10}
        CLICKHOUSE_JDBC_VERSION: ${CLICKHOUSE_JDBC_VERSION:-0.9.7}
    restart: unless-stopped
    depends_on:
      liquibase-postgres:
        condition: service_completed_successfully
      liquibase-greenplum:
        condition: service_completed_successfully
      liquibase-clickhouse:
        condition: service_completed_successfully
    ports:
      - "${NIFI_PORT:-8443}:8443"
    environment:
      NIFI_WEB_HTTPS_HOST: 0.0.0.0
      NIFI_WEB_HTTPS_PORT: 8443
      NIFI_WEB_PROXY_HOST: ${NIFI_WEB_PROXY_HOST:-localhost:8443,127.0.0.1:8443,nifi:8443}
      NIFI_SENSITIVE_PROPS_KEY: ${NIFI_SENSITIVE_PROPS_KEY:-greenplum-nifi-sensitive-key}
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_USERNAME:-admin}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_PASSWORD:-GreenplumNiFi123}
      NIFI_JVM_HEAP_INIT: ${NIFI_JVM_HEAP_INIT:-512m}
      NIFI_JVM_HEAP_MAX: ${NIFI_JVM_HEAP_MAX:-1g}
    volumes:
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_database_repository:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content_repository:/opt/nifi/nifi-current/content_repository
      - nifi_provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - nifi_state:/opt/nifi/nifi-current/state
      - nifi_logs:/opt/nifi/nifi-current/logs
      - ./data/landing:/data/landing
    healthcheck:
      test: ["CMD-SHELL", "curl -kfsS https://localhost:8443/nifi/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 2m

  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-26.3.9.8}
    hostname: clickhouse
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-dwh}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-dwh}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dwhpw}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  liquibase-clickhouse:
    build:
      context: ./liquibase-clickhouse
      args:
        LIQUIBASE_VERSION: ${CLICKHOUSE_LIQUIBASE_VERSION:-4.33.0}
        CLICKHOUSE_JDBC_VERSION: ${CLICKHOUSE_JDBC_VERSION:-0.9.7}
        CLICKHOUSE_LIQUIBASE_EXTENSION_VERSION: ${CLICKHOUSE_LIQUIBASE_EXTENSION_VERSION:-0.9.1}
    depends_on:
      clickhouse:
        condition: service_healthy
    command:
      - --search-path=/liquibase/changelog
      - --changelog-file=root.yaml
      - --url=jdbc:clickhouse://clickhouse:8123/${CLICKHOUSE_DB:-dwh}
      - --username=${CLICKHOUSE_USER:-dwh}
      - --password=${CLICKHOUSE_PASSWORD:-dwhpw}
      - --driver=com.clickhouse.jdbc.ClickHouseDriver
      - --log-level=${CLICKHOUSE_LIQUIBASE_LOG_LEVEL:-info}
      - update

  liquibase-postgres:
    build:
      context: ./liquibase-postgres
      args:
        LIQUIBASE_VERSION: ${POSTGRES_LIQUIBASE_VERSION:-5.0.2}
        POSTGRES_JDBC_VERSION: ${POSTGRES_JDBC_VERSION:-42.7.10}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --search-path=/liquibase/changelog
      - --changelog-file=root.yaml
      - --url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-app}
      - --username=${POSTGRES_USER:-app}
      - --password=${POSTGRES_PASSWORD:-apppw}
      - --log-level=${POSTGRES_LIQUIBASE_LOG_LEVEL:-info}
      - update

  liquibase-greenplum:
    build:
      context: ./liquibase-greenplum
      args:
        LIQUIBASE_VERSION: ${GREENPLUM_LIQUIBASE_VERSION:-5.0.2}
        POSTGRES_JDBC_VERSION: ${POSTGRES_JDBC_VERSION:-42.7.10}
    depends_on:
      gpdb:
        condition: service_healthy
    command:
      - --search-path=/liquibase/changelog
      - --changelog-file=root.yaml
      - --url=jdbc:postgresql://gpdb:5432/${GREENPLUM_DATABASE_NAME:-gpdb}
      - --username=gpadmin
      - --password=${GREENPLUM_PASSWORD:-gpadminpw}
      - --log-level=${GREENPLUM_LIQUIBASE_LOG_LEVEL:-info}
      - update

  pxf-examples:
    image: woblerr/greenplum:${GREENPLUM_VERSION:-6.27.1}
    depends_on:
      liquibase-greenplum:
        condition: service_completed_successfully
      hive-init:
        condition: service_completed_successfully
    environment:
      GREENPLUM_HOST: gpdb
      GREENPLUM_DATABASE_NAME: ${GREENPLUM_DATABASE_NAME:-gpdb}
      PGPASSWORD: ${GREENPLUM_PASSWORD:-gpadminpw}
    volumes:
      - ./greenplum/create-pxf-example-tables.sh:/greenplum/create-pxf-example-tables.sh:ro
    command: ["/greenplum/create-pxf-example-tables.sh"]
networks:
  default:
    name: dwh-greenplum
volumes:
  postgres_data:
  gpdata:
  hive_metastore_db:
  hive_warehouse:
  nifi_conf:
  nifi_database_repository:
  nifi_flowfile_repository:
  nifi_content_repository:
  nifi_provenance_repository:
  nifi_state:
  nifi_logs:
  clickhouse_data:
  clickhouse_logs:
